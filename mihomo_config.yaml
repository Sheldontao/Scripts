# ------------------------------------------------- #
#                   规则 (Rules)                     #
# ------------------------------------------------- #
rules:
  # --- Block Trackers, Leaks, and Ads ---
  # Block STUN protocol (WebRTC IP leak)
  - AND,((OR,((DST-PORT,3478),(DST-PORT,5349))),(NOT,((RULE-SET,cn_ip,no-resolve)))),REJECT
  # The following rule blocks UDP traffic on port 443, which is the primary port for QUIC.
  - RULE-SET,private,DIRECT
  - DOMAIN-SUFFIX,wiwide.com,DIRECT
  - DOMAIN,captive.apple.com,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve
  - PROCESS-NAME,aria2c,DIRECT
  - PROCESS-NAME,motrix-next-engine,DIRECT
  - PROCESS-NAME,Microsoft Outlook,DIRECT
  - RULE-SET,ads,REJECT

  # --- Rule Set Based Routing ---
  # - RULE-SET,apple_ip,apple,no-resolve
  #  - RULE-SET,apple@cn,apple@cn
  - RULE-SET,bilibili_domain,bilibili
  - RULE-SET,github,github
  - RULE-SET,microsoft@cn,microsoft@cn
  - RULE-SET,Speedtest,Speedtest
  - RULE-SET,ai_domain,ai
  - AND,((RULE-SET,emby),(DOMAIN-KEYWORD,emby.)),emby
  - RULE-SET,netflix_domain,streaming
  - RULE-SET,netflix_ip,streaming,no-resolve
  - RULE-SET,telegram_domain,telegram
  - RULE-SET,telegram_ip,telegram,no-resolve
  - RULE-SET,youtube_domain,streaming
  - RULE-SET,google_domain,google
  - RULE-SET,google_ip,google,no-resolve
  - DOMAIN,apps.apple.com,proxy
  - RULE-SET,apple_cn,cn
  - RULE-SET,proxy_domain,proxy
  - RULE-SET,cn_domain,cn
  - RULE-SET,bank_cn_domain,cn
  - RULE-SET,cn_ip,cn

  # --- Final Match ---
  - MATCH,proxy
